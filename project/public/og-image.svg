      <path d="M350 201 L770 201" stroke="#25c2f0" stroke-width="3" opacity="0.35" stroke-linecap="round" />
      <path d="M800 125 L1088 125" stroke="#d14fe4" stroke-width="3" opacity="0.35" stroke-linecap="round" />
    </g>
  </g>
  <text x="80" y="130" font-family="Inter, sans-serif" font-size="58" fill="#ffffff" font-weight="700">Kian Price</text>
  <text x="80" y="190" font-family="Inter, sans-serif" font-size="26" fill="#9fb2cf">Bespoke, launch-ready websites for premium brands</text>
