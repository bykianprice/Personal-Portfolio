    <circle cx="0" cy="280" r="14" fill="#f5d163" />
    <circle cx="320" cy="210" r="18" fill="#ffffff" />
    <circle cx="620" cy="170" r="14" fill="#25c2f0" />
    <circle cx="840" cy="230" r="18" fill="#ffffff" />
    <circle cx="1060" cy="200" r="16" fill="#d14fe4" />
    <g>
      <rect x="40" y="-20" width="335" height="170" rx="34" fill="#0f1d34" opacity="0.92" />
      <rect x="350" y="85" width="420" height="210" rx="34" fill="#11253d" opacity="0.92" />
      <rect x="800" y="25" width="290" height="220" rx="34" fill="#132a46" opacity="0.92" />
      <rect x="40" y="260" width="475" height="240" rx="34" fill="#0f1d34" opacity="0.92" />
