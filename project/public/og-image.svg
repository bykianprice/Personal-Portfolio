<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1622" />
      <stop offset="100%" stop-color="#101f38" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d163" />
      <stop offset="45%" stop-color="#d14fe4" />
      <stop offset="100%" stop-color="#25c2f0" />
    </linearGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d163" stop-opacity="0.7" />
      <stop offset="35%" stop-color="#d14fe4" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#25c2f0" stop-opacity="0.7" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <g filter="url(#softGlow)">
    <circle cx="220" cy="160" r="110" fill="#f5d163" opacity="0.22" />
    <circle cx="960" cy="170" r="140" fill="#25c2f0" opacity="0.18" />
    <circle cx="680" cy="470" r="90" fill="#d14fe4" opacity="0.2" />
  </g>
  <g transform="translate(120 120)">
